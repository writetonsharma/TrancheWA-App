spring.application.name=bakery

# Database
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${POSTGRES_DB:tranche_bakery}
spring.datasource.username=${POSTGRES_USER:bakery}
spring.datasource.password=${POSTGRES_PASSWORD:bakery}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# WhatsApp Cloud API
whatsapp.api.url=https://graph.facebook.com/v19.0
whatsapp.api.token=${WHATSAPP_API_TOKEN}
whatsapp.api.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID}
whatsapp.webhook.verify-token=${WHATSAPP_WEBHOOK_VERIFY_TOKEN:tranche-local-2026}

# Cutoff time (24h format)
bakery.order.cutoff-hour=17

# Max total items bakeable per delivery day
bakery.order.daily-capacity=15

# Admin credentials — change password before going live
admin.username=admin
admin.password=${ADMIN_PASSWORD:tranche2026}

# Payment
bakery.payment.upi-id=${BAKERY_UPI_ID:9811843373@ptsbi}
bakery.payment.upi-name=${BAKERY_UPI_NAME:Naveen Sharma}
bakery.payment.test-mode=${BAKERY_PAYMENT_TEST_MODE:false}
bakery.admin.phone=${BAKERY_ADMIN_PHONE:9811843373}

# Delivery
bakery.order.delivery-charge=${BAKERY_DELIVERY_CHARGE:50}
