<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conversation — Tranché Bakery Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f5f0; }
    .chat-container { max-width: 700px; margin: 0 auto; }
    .chat-bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; margin-bottom: 8px; word-wrap: break-word; }
    .bubble-inbound { background: #e9ecef; align-self: flex-start; border-bottom-left-radius: 4px; }
    .bubble-outbound { background: #d1e7dd; align-self: flex-end; border-bottom-right-radius: 4px; }
    .chat-messages { display: flex; flex-direction: column; min-height: 300px; max-height: 500px; overflow-y: auto; padding: 1rem; }
    .msg-time { font-size: 0.7rem; color: #6c757d; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" th:href="@{/admin}">🥖 Tranché Bakery — Admin</a>
  </div>
</nav>

<div class="container-fluid px-4">
  <div class="chat-container">

    <!-- Flash message -->
    <div th:if="${flash}" class="alert alert-success alert-dismissible fade show" role="alert">
      <span th:text="${flash}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card">
      <!-- Customer Info Bar -->
      <div class="card-header bg-light border-bottom">
        <div class="row g-2 align-items-center">
          <div class="col-auto">
            <strong th:text="${thread.customer().name ?: thread.customer().phone}"></strong>
            <small class="text-muted d-block" th:if="${thread.customer().name}" th:text="${thread.customer().phone}"></small>
          </div>
          <div class="col">
            <small class="text-muted" th:if="${thread.customer().deliveryArea}">
              📍 <span th:text="${thread.customer().deliveryArea}"></span>
            </small>
            <small class="text-muted d-block" th:if="${thread.customer().deliveryAddress}" th:text="${thread.customer().deliveryAddress}"></small>
          </div>
          <div class="col-auto" th:if="${thread.customer().locationLat != null and thread.customer().locationLng != null}">
            <a th:href="'https://maps.google.com/?q=' + ${thread.customer().locationLat} + ',' + ${thread.customer().locationLng}"
               target="_blank" class="btn btn-sm btn-outline-primary">📍 Open in Maps</a>
          </div>
        </div>
      </div>
      <!-- Edit customer details (admin correction for one-off cases) -->
      <div class="card-header bg-white border-bottom py-2">
        <button class="btn btn-sm btn-outline-secondary" type="button"
                data-bs-toggle="collapse" data-bs-target="#editDetails">
          &#9998; Edit details
        </button>
        <div class="collapse mt-3" id="editDetails">
          <form th:action="@{/admin/conversation/{phone}/update-details(phone=${thread.customer().phone})}" method="post">
            <div class="row g-2">
              <div class="col-md-6">
                <label class="form-label mb-1 small">Name</label>
                <input type="text" name="name" class="form-control form-control-sm"
                       th:value="${thread.customer().name}">
              </div>
              <div class="col-md-6">
                <label class="form-label mb-1 small">Pincode / Area</label>
                <input type="text" name="deliveryArea" class="form-control form-control-sm"
                       th:value="${thread.customer().deliveryArea}">
              </div>
              <div class="col-12">
                <label class="form-label mb-1 small">Delivery address</label>
                <textarea name="deliveryAddress" rows="2"
                          class="form-control form-control-sm" th:text="${thread.customer().deliveryAddress}"></textarea>
              </div>
              <div class="col-md-6">
                <label class="form-label mb-1 small">Location latitude</label>
                <input type="text" name="locationLat" class="form-control form-control-sm"
                       th:value="${thread.customer().locationLat}">
              </div>
              <div class="col-md-6">
                <label class="form-label mb-1 small">Location longitude</label>
                <input type="text" name="locationLng" class="form-control form-control-sm"
                       th:value="${thread.customer().locationLng}">
              </div>
            </div>
            <div class="mt-2 d-flex align-items-center gap-2">
              <button type="submit" class="btn btn-sm btn-primary">Save details</button>
              <small class="text-muted">Leave a field blank to clear it.</small>
            </div>
          </form>
        </div>
      </div>
      <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
        <span>
          💬 Conversation with
          <strong th:text="${thread.customer().phone}"></strong>
          <small th:if="${thread.customer().name}" th:text="' (' + ${thread.customer().name} + ')'"></small>
        </span>
        <a th:href="@{/admin}" class="btn btn-sm btn-light">← Dashboard</a>
      </div>
      <div class="card-body p-0">
        <div class="chat-messages" id="chatMessages">
          <div th:if="${thread.messages().isEmpty()}" class="text-muted text-center p-3">
            No messages yet. Send the first message below.
          </div>
          <div th:each="msg : ${thread.messages()}"
               th:classappend="${msg.direction.name() == 'INBOUND'} ? 'bubble-inbound' : 'bubble-outbound'"
               class="chat-bubble">
            <div th:text="${msg.message}"></div>
            <div class="msg-time" th:text="${#temporals.format(msg.createdAt, 'dd MMM HH:mm')}"></div>
          </div>
        </div>
      </div>
      <div class="card-footer">
        <form th:action="@{/admin/conversation/{phone}/send(phone=${thread.customer().phone})}" method="post">
          <div class="input-group">
            <textarea name="message" class="form-control" rows="2" placeholder="Type your reply..." required></textarea>
            <button type="submit" class="btn btn-success">Send ✉️</button>
          </div>
        </form>
      </div>
    </div>

    <a th:href="@{/admin}" class="btn btn-outline-secondary mt-3">← Back to Dashboard</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  var chatEl = document.getElementById('chatMessages');
  if (chatEl) chatEl.scrollTop = chatEl.scrollHeight;
</script>
</body>
</html>
