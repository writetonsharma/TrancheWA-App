<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tranché Bakery — Orders</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f5f0; }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; }
    .section-card { background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 1.5rem; }
    .section-card .card-header { border-radius: 8px 8px 0 0; font-weight: 600; }
    .badge-count { font-size: .75rem; }
    .items-cell { max-width: 260px; word-break: break-word; }
    .filter-bar { background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <span class="navbar-brand">🍞 Tranché Bakery — Orders</span>
    <div class="d-flex align-items-center gap-3">
      <span class="navbar-text text-white-50" th:text="${#temporals.format(today, 'EEEE, d MMMM yyyy')}"></span>
      <a href="/admin" class="btn btn-sm btn-outline-light">&#8592; Dashboard</a>
      <a href="/admin/bake-list" class="btn btn-sm btn-outline-light">&#127838; Bake List</a>
      <a href="/admin/pricing" class="btn btn-sm btn-outline-warning">Pricing</a>
    </div>
  </div>
</nav>

<div class="container-fluid px-4">

  <div class="mb-3 d-flex flex-wrap gap-2">
    <a class="btn btn-sm btn-outline-dark" th:href="@{/admin/orders(from=${today},to=${today})}">Today</a>
    <a class="btn btn-sm btn-outline-dark" th:href="@{/admin/orders(from=${tomorrow},to=${tomorrow})}">Tomorrow</a>
    <a class="btn btn-sm btn-outline-secondary" th:href="@{/admin/orders(from=${tomorrow},to=${tomorrow},status='CONFIRMED')}">Tomorrow confirmed</a>
    <a class="btn btn-sm btn-outline-secondary" th:href="@{/admin/orders(status='PAYMENT_REVIEW_REQUIRED')}">Payment review</a>
    <a class="btn btn-sm btn-outline-secondary" th:href="@{/admin/orders(from=${today},to=${weekEnd})}">This week</a>
    <a class="btn btn-sm btn-outline-secondary" th:href="@{/admin/orders}">All</a>
  </div>

  <!-- Filter bar -->
  <form th:action="@{/admin/orders}" method="get" class="filter-bar">
    <div class="row g-3 align-items-end">
      <div class="col-auto">
        <label class="form-label mb-1 small text-muted">Delivery from</label>
        <input type="date" name="from" class="form-control form-control-sm" th:value="${fFrom}">
      </div>
      <div class="col-auto">
        <label class="form-label mb-1 small text-muted">Delivery to</label>
        <input type="date" name="to" class="form-control form-control-sm" th:value="${fTo}">
      </div>
      <div class="col-auto">
        <label class="form-label mb-1 small text-muted">Status</label>
        <select name="status" class="form-select form-select-sm">
          <option value="">All statuses</option>
          <option th:each="s : ${allStatuses}" th:value="${s.name()}" th:text="${s.name()}"
                  th:selected="${s.name() == fStatus}"></option>
        </select>
      </div>
      <div class="col-auto">
        <label class="form-label mb-1 small text-muted">Customer (phone or name)</label>
        <input type="text" name="customer" class="form-control form-control-sm" th:value="${fCustomer}"
               placeholder="e.g. 98xxxx or Priya">
      </div>
      <div class="col-auto">
        <button type="submit" class="btn btn-sm btn-primary">Filter</button>
        <a th:href="@{/admin/orders}" class="btn btn-sm btn-outline-secondary">Clear</a>
        <a class="btn btn-sm btn-outline-success"
           th:href="@{/admin/orders/export(from=${fFrom},to=${fTo},status=${fStatus},customer=${fCustomer})}">Export CSV</a>
      </div>
    </div>
  </form>

  <!-- Results -->
  <div class="section-card">
    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
      <span>Orders</span>
      <span class="badge bg-white text-dark badge-count"
            th:text="${orderPage.totalElements} + ' total'"></span>
    </div>
    <div class="card-body p-0">
      <div th:if="${orderPage.orders.isEmpty()}" class="p-3 text-muted">No orders match these filters.</div>
      <div th:unless="${orderPage.orders.isEmpty()}" class="table-responsive">
        <table class="table table-sm table-hover mb-0 align-middle">
          <thead class="table-light">
            <tr>
              <th>Order #</th><th>Customer</th><th>Items</th><th>Total</th>
              <th>Status</th><th>Delivery</th><th>Created</th><th>Location</th><th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="v : ${orderPage.orders}">
              <td th:text="${v.order.orderNumber ?: v.order.id}"></td>
              <td>
                <a th:href="@{'/admin/conversation/' + ${v.order.customer.phone}}"
                   th:text="${v.order.customer.phone}"></a>
                <div><small class="text-muted" th:text="${v.order.customer.name}"></small></div>
              </td>
              <td class="items-cell" th:text="${v.itemsSummary}"></td>
              <td th:text="${v.order.totalAmount != null ? '₹' + v.order.totalAmount : '—'}"></td>
              <td><span class="badge bg-secondary" th:text="${v.order.status.name()}"></span></td>
              <td th:text="${v.order.deliveryDate != null ? #temporals.format(v.order.deliveryDate, 'EEE, d MMM') : '—'}"></td>
              <td th:text="${#temporals.format(v.order.createdAt, 'dd MMM HH:mm')}"></td>
              <td>
                <a th:if="${v.mapsUrl != null}" th:href="${v.mapsUrl}" target="_blank" class="btn btn-sm btn-outline-primary">Maps</a>
                <span th:unless="${v.mapsUrl != null}" class="text-muted">—</span>
              </td>
              <td class="text-nowrap">
                <form th:if="${v.order.status.name() == 'PAYMENT_SCREENSHOT_RECEIVED' or v.order.status.name() == 'PAYMENT_REVIEW_REQUIRED'}"
                      th:action="@{/admin/orders/{id}/approve-payment(id=${v.order.id})}" method="post" class="d-inline">
                  <input type="hidden" name="returnTo" th:value="@{/admin/orders(from=${fFrom},to=${fTo},status=${fStatus},customer=${fCustomer},page=${orderPage.page})}">
                  <button type="submit" class="btn btn-sm btn-success">Approve</button>
                </form>
                <form th:if="${v.order.status.name() == 'PAYMENT_SCREENSHOT_RECEIVED'}"
                      th:action="@{/admin/orders/{id}/flag-payment(id=${v.order.id})}" method="post" class="d-inline">
                  <input type="hidden" name="returnTo" th:value="@{/admin/orders(from=${fFrom},to=${fTo},status=${fStatus},customer=${fCustomer},page=${orderPage.page})}">
                  <button type="submit" class="btn btn-sm btn-outline-warning">Flag</button>
                </form>
                <form th:if="${v.order.status.name() == 'CONFIRMED'}"
                      th:action="@{/admin/orders/{id}/mark-baking(id=${v.order.id})}" method="post" class="d-inline">
                  <input type="hidden" name="returnTo" th:value="@{/admin/orders(from=${fFrom},to=${fTo},status=${fStatus},customer=${fCustomer},page=${orderPage.page})}">
                  <button type="submit" class="btn btn-sm btn-outline-primary">In Baking</button>
                </form>
                <form th:if="${v.order.status.name() == 'IN_BAKING'}"
                      th:action="@{/admin/orders/{id}/complete(id=${v.order.id})}" method="post" class="d-inline">
                  <input type="hidden" name="returnTo" th:value="@{/admin/orders(from=${fFrom},to=${fTo},status=${fStatus},customer=${fCustomer},page=${orderPage.page})}">
                  <button type="submit" class="btn btn-sm btn-primary"
                          onclick="return confirm('Mark this order as completed?')">Complete</button>
                </form>
                <form th:if="${v.order.status.name() != 'CANCELLED' and v.order.status.name() != 'COMPLETED'}"
                      th:action="@{/admin/orders/{id}/cancel(id=${v.order.id})}" method="post" class="d-inline">
                  <input type="hidden" name="returnTo" th:value="@{/admin/orders(from=${fFrom},to=${fTo},status=${fStatus},customer=${fCustomer},page=${orderPage.page})}">
                  <button type="submit" class="btn btn-sm btn-outline-danger"
                          onclick="return confirm('Cancel this order? This cannot be undone from the dashboard.')">Cancel</button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <!-- Paging -->
    <div th:if="${orderPage.totalPages > 1}"
         class="card-footer d-flex justify-content-between align-items-center bg-white">
      <a class="btn btn-sm btn-outline-secondary"
         th:classappend="${!orderPage.hasPrevious()} ? 'disabled'"
         th:href="@{/admin/orders(from=${fFrom},to=${fTo},status=${fStatus},customer=${fCustomer},page=${orderPage.page - 1})}">&#8592; Previous</a>
      <span class="text-muted small"
            th:text="'Page ' + ${orderPage.displayPage()} + ' of ' + ${orderPage.totalPages}"></span>
      <a class="btn btn-sm btn-outline-secondary"
         th:classappend="${!orderPage.hasNext()} ? 'disabled'"
         th:href="@{/admin/orders(from=${fFrom},to=${fTo},status=${fStatus},customer=${fCustomer},page=${orderPage.page + 1})}">Next &#8594;</a>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
