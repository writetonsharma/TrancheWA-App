# Tests connect to a local PostgreSQL database.
#
# One-time setup (run these in psql as a superuser):
#   CREATE DATABASE tranche_bakery_test;
#   CREATE USER bakery WITH PASSWORD 'bakery';
#   GRANT ALL PRIVILEGES ON DATABASE tranche_bakery_test TO bakery;
#
# Then run:  mvn test
#
# Flyway will create all tables automatically on first run.

spring.datasource.url=jdbc:postgresql://localhost:5432/tranche_bakery_test
spring.datasource.username=bakery
spring.datasource.password=bakery

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# WhatsAppClient is @MockBean so its constructor never runs,
# but @Value bindings are still resolved — supply dummy values.
whatsapp.api.url=http://localhost:9999
whatsapp.api.token=test-token
whatsapp.api.phone-number-id=test-phone-id
whatsapp.webhook.verify-token=test-verify

# Payment
bakery.payment.upi-id=test@upi
bakery.payment.upi-name=Test Bakery
bakery.payment.test-mode=false
bakery.admin.phone=

# Admin
admin.username=admin
admin.password=testpass

# Cutoff: 23 so tests always see tomorrow as a valid delivery date
bakery.order.cutoff-hour=23

# Max total items bakeable per delivery day
bakery.order.daily-capacity=3

# Delivery charge for tests
bakery.order.delivery-charge=50
